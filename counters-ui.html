<!-- ============================================================
     قسم العدادات — النسخة المصححة
     [إصلاح] data-counter: diesel91/diesel95 → fuel91/fuel95
     ============================================================ -->

<!-- ✅ ملخص اليوم -->
<div class="card" style="margin-bottom: 14px;">
  <div class="card-header">
    <h3 style="display:flex;align-items:center;gap:8px;">
      <span>📊</span>
      <span>ملخص اليوم</span>
    </h3>
    <span data-sync-indicator style="font-size:11px;font-weight:700;color:var(--gold);">✅ متزامن</span>
  </div>

  <!-- العدادات الثلاثة -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px;">

    <!-- ديزل -->
    <div data-counter="diesel" style="
      background:linear-gradient(135deg,#f5f5f5,#e8e8e8);
      border:1px solid #ddd;border-radius:10px;
      padding:12px;text-align:center;">
    </div>

    <!-- ❌ كان: data-counter="diesel91" — لا يطابق JavaScript -->
    <!-- ✅ الآن: data-counter="fuel91" -->
    <div data-counter="fuel91" style="
      background:linear-gradient(135deg,#f5f5f5,#e8e8e8);
      border:1px solid #ddd;border-radius:10px;
      padding:12px;text-align:center;">
    </div>

    <!-- ❌ كان: data-counter="diesel95" — لا يطابق JavaScript -->
    <!-- ✅ الآن: data-counter="fuel95" -->
    <div data-counter="fuel95" style="
      background:linear-gradient(135deg,#f5f5f5,#e8e8e8);
      border:1px solid #ddd;border-radius:10px;
      padding:12px;text-align:center;">
    </div>

  </div>

  <!-- الإجمالي -->
  <div style="
    background:linear-gradient(135deg,rgba(192,57,43,0.1),rgba(212,172,13,0.08));
    border-top:2px solid #eee;padding:12px;text-align:center;">
    <div data-counter="total"></div>
  </div>
</div>

<!-- ✅ قسم الإدخال السريع -->
<div class="card" style="margin-top:12px;">
  <div class="card-header">
    <h3>📥 إدخال استهلاك</h3>
  </div>
  <div style="padding:12px;display:flex;flex-direction:column;gap:8px;">

    <!-- ديزل -->
    <div style="display:flex;gap:6px;">
      <input type="number" id="dieselInput" class="form-input"
             placeholder="اللترات" min="0" step="0.1" style="flex:1;">
      <button class="btn btn-primary"
              onclick="(function(){
                var v=parseFloat(document.getElementById('dieselInput').value||0);
                if(v>0){CountersAPI.updateCounter('diesel',v);document.getElementById('dieselInput').value='';}
              })()"
              style="min-width:90px;background:#555;">
        ⬜ ديزل
      </button>
    </div>

    <!-- 91 -->
    <div style="display:flex;gap:6px;">
      <input type="number" id="fuel91Input" class="form-input"
             placeholder="اللترات" min="0" step="0.1" style="flex:1;">
      <button class="btn btn-primary"
              onclick="(function(){
                var v=parseFloat(document.getElementById('fuel91Input').value||0);
                if(v>0){CountersAPI.updateCounter('fuel91',v);document.getElementById('fuel91Input').value='';}
              })()"
              style="min-width:90px;background:#27ae60;">
        🟢 91
      </button>
    </div>

    <!-- 95 -->
    <div style="display:flex;gap:6px;">
      <input type="number" id="fuel95Input" class="form-input"
             placeholder="اللترات" min="0" step="0.1" style="flex:1;">
      <button class="btn btn-primary"
              onclick="(function(){
                var v=parseFloat(document.getElementById('fuel95Input').value||0);
                if(v>0){CountersAPI.updateCounter('fuel95',v);document.getElementById('fuel95Input').value='';}
              })()"
              style="min-width:90px;background:#c0392b;">
        🔴 95
      </button>
    </div>

  </div>
</div>

<!-- ✅ تأكد أن هذا السطر موجود قبل </body> -->
<script src="src/js/counters-handler.js"></script>
